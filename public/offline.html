<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#1d4ed8" />
		<title>Offline | Jexon</title>
		<style>
			:root {
				color-scheme: dark;
			}
			body {
				margin: 0;
				min-height: 100vh;
				display: grid;
				place-items: center;
				font-family: Inter, Segoe UI, system-ui, sans-serif;
				background: radial-gradient(circle at 20% 20%, #1e3a8a, #0b1220 60%);
				color: #e2e8f0;
				padding: 1rem;
			}
			main {
				width: min(92vw, 480px);
				padding: 1.25rem 1.2rem;
				border-radius: 14px;
				background: rgba(15, 23, 42, 0.72);
				border: 1px solid rgba(148, 163, 184, 0.32);
			}
			h1 {
				margin: 0 0 0.5rem;
				font-size: 1.3rem;
			}
			p {
				margin: 0;
				color: #cbd5e1;
				line-height: 1.6;
			}
		</style>
	</head>
	<body>
		<main>
			<h1>You are offline</h1>
			<p>Jexon is currently offline. Reconnect to sync the latest updates.</p>
		</main>
	</body>
</html>
